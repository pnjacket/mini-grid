  # --- Slice 10: framework adapters (thin wrappers over the core PUBLIC api;
  # AC-BOUNDARY — adapters import @mini-grid/core's public surface only, never
  # inline it). Each mounts the same core the plain-HTML E2E proves
  # (SUCCESS-FRAMEWORK-AGNOSTIC). Frameworks are optional peerDependencies
  # (DEP-REACT/-VUE/-SVELTE), versioned in lockstep with the core. ---
  COMPONENT-ADAPTER-REACT:
    locators:
      - { path: packages/react/src/index.ts, symbol: MiniGrid }
      - { path: packages/react/src/index.ts, symbol: MiniGridProps }
    asserted_by:
      - { path: packages/react/src/mini-grid.test.ts, symbol: "@mini-grid/react <MiniGrid>",
          run: "pnpm vitest run packages/react/src/mini-grid.test.ts" }
  COMPONENT-ADAPTER-VUE:
    locators:
      - { path: packages/vue/src/index.ts, symbol: MiniGrid }
    asserted_by:
      - { path: packages/vue/src/mini-grid.test.ts, symbol: "@mini-grid/vue <MiniGrid>",
          run: "pnpm vitest run packages/vue/src/mini-grid.test.ts" }
  COMPONENT-ADAPTER-SVELTE:
    locators:
      - { path: packages/svelte/src/index.ts, symbol: miniGrid }
      - { path: packages/svelte/src/index.ts, symbol: createMiniGrid }
    asserted_by:
      - { path: packages/svelte/src/mini-grid.test.ts, symbol: "@mini-grid/svelte miniGrid action",
          run: "pnpm vitest run packages/svelte/src/mini-grid.test.ts" }
  # DEP-* — the framework peer dependencies (optional), declared per adapter
  # package and versioned in lockstep with @mini-grid/core.
  DEP-REACT:
    locators:
      - { path: packages/react/package.json, symbol: peerDependencies.react }
  DEP-VUE:
    locators:
      - { path: packages/vue/package.json, symbol: peerDependencies.vue }
  DEP-SVELTE:
    locators:
      - { path: packages/svelte/package.json, symbol: peerDependencies.svelte }
  # SUCCESS-FRAMEWORK-AGNOSTIC — the grid mounts + works in plain HTML AND via
  # each adapter. Plain-HTML is proven by the existing E2E; each adapter test
  # proves the wrapper mounts the same core (role=grid, aria-rowcount, events).
  SUCCESS-FRAMEWORK-AGNOSTIC:
    locators:
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
      - { path: packages/react/src/index.ts, symbol: MiniGrid }
      - { path: packages/vue/src/index.ts, symbol: MiniGrid }
      - { path: packages/svelte/src/index.ts, symbol: miniGrid }
    asserted_by:
      - { path: packages/react/src/mini-grid.test.ts, symbol: "mounts a role=grid with the right aria-rowcount",
          run: "pnpm vitest run packages/react/src/mini-grid.test.ts -t 'mounts a role=grid'" }
      - { path: packages/vue/src/mini-grid.test.ts, symbol: "mounts, reflects data updates, emits events, destroys on unmount",
          run: "pnpm vitest run packages/vue/src/mini-grid.test.ts" }
      - { path: packages/svelte/src/mini-grid.test.ts, symbol: "mounts, reflects data updates, forwards events, destroys on teardown",
          run: "pnpm vitest run packages/svelte/src/mini-grid.test.ts" }
      - { path: e2e/grid.spec.ts, symbol: "plain-HTML mount (core mounts without any framework)",
          run: "pnpm exec playwright test e2e/grid.spec.ts" }

  # --- Slice 11a: SEC-CSP-COMPAT (the CSP/a11y slice of Security; the full
  # static-scan battery — SEC-NO-EVAL/-EGRESS/-PERSIST/-LOG-VALUES — lands 11b) ---
  SEC-CSP-COMPAT:
    locators:
      # No eval/new Function/inline-script in core (Trusted-Types-friendly by
      # construction); the worker source is configurable via `workerUrl` so a
      # strict-CSP host serves a same-origin module worker (no blob:). Default is
      # the in-process transport (no worker at all).
      - { path: packages/core/src/api/grid.ts, symbol: createTransport }
      - { path: packages/core/src/api/options.ts, symbol: "GridOptions.workerUrl" }
      - { path: packages/core/src/protocol/transport.ts, symbol: InProcessTransport }
    asserted_by:
      - { path: e2e/a11y.spec.ts, symbol: AC-CSP,
          run: "pnpm exec playwright test e2e/a11y.spec.ts -g 'AC-CSP'" }

  # --- Slice 11b: Security static-scan battery (SEC-NO-* negative/hygiene
  # assertions) + feature-flag ON/OFF pairwise matrix (AC-FLAGS) + PERF-SCROLL
  # dirty-diff re-assert. The SEC-NO-* are checked against the BUILT core bundle
  # (packages/core/dist/index.js); the runtime active controls are re-asserted
  # page-governed in e2e/security.spec.ts. ---
  SEC-NO-EGRESS:
    locators:
      # Absence contract: no fetch/XHR/WebSocket/sendBeacon/EventSource anywhere in
      # core. The default transport is in-process (no network); the optional worker
      # is a same-origin module worker (no egress of its own).
      - { path: packages/core/src/protocol/transport.ts, symbol: InProcessTransport }
      - { path: packages/core/src/api/grid.ts, symbol: createTransport }
    asserted_by:
      - { path: packages/core/src/security.static.test.ts, symbol: SEC-NO-EGRESS,
          run: "pnpm vitest run packages/core/src/security.static.test.ts -t 'SEC-NO-EGRESS'" }
  SEC-NO-PERSIST:
    locators:
      # serializeState() RETURNS state to the caller; the grid writes no storage of
      # its own (no localStorage/sessionStorage/cookie/indexedDB).
      - { path: packages/core/src/api/grid.ts, symbol: serializeStateImpl }
    asserted_by:
      - { path: packages/core/src/security.static.test.ts, symbol: SEC-NO-PERSIST,
          run: "pnpm vitest run packages/core/src/security.static.test.ts -t 'SEC-NO-PERSIST'" }
  SEC-NO-EVAL:
    locators:
      # Predicates/validators/formatters/comparators are developer functions, never
      # stringified code — no eval / new Function on any path.
      - { path: packages/core/src/editing/validation.ts, symbol: compileValidation }
      - { path: packages/core/src/format/conditional.ts, symbol: ConditionalFormatEngine }
    asserted_by:
      - { path: packages/core/src/security.static.test.ts, symbol: SEC-NO-EVAL,
          run: "pnpm vitest run packages/core/src/security.static.test.ts -t 'SEC-NO-EVAL'" }
  SEC-NO-SECRETS:
    locators:
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
    asserted_by:
      - { path: packages/core/src/security.static.test.ts, symbol: SEC-NO-SECRETS,
          run: "pnpm vitest run packages/core/src/security.static.test.ts -t 'SEC-NO-SECRETS'" }
  SEC-NO-LOG-VALUES:
    locators:
      # GridError.context references cells by (rowKey, columnId), never by value; no
      # console.* of cell values anywhere in the bundle (PATTERN-ERROR never logs).
