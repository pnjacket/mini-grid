# Coverage: in-progress first build. Unbound in-scope Contract-grade contracts are NOT gaps —
# they are unbuilt slices (see IMPLEMENTATION.md). Binding grows per slice; kinds are curated
# until their realizing slice lands.
coverage:
  curated:
    ENTITY: "read-path entities bound (slice 1); edit/structural entities bind in later slices (locus: packages/core/src/)"
    COMPONENT: "read-path components bound; interaction/edit/format/export components bind later (locus: packages/core/src/)"
    LIB: "read-path API bound; mutation/view/structural LIB-* bind later (locus: packages/core/src/api/)"
    EVT: "slice 2: event bus (EventBus) + EVT-ERROR/EVT-STATE-CHANGE bound; action before/after pairs bind with their slices (locus: packages/core/src/api/)"
    MSG: "read+index protocol bound; mutation MSG-* bind with their slices (locus: packages/core/src/protocol/)"
    INV: "3 read-path invariants bound; structural invariants bind with their slices (locus: packages/core/src/)"
    DOM: "read-path DOM hooks bound; BIND-*/editor/menu DOM bind with interaction slices (locus: packages/core/src/render/)"
