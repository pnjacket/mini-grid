# bindings.yaml — Dictum contract->code binding map (STANDARD Part 10d).
# CURRENT doc<->code correspondence only; populated as each slice is built.
# Self-validated by the drift-detector every run. History rides on git.
# Shape per dictum/templates/binding-map.template.md (map keyed by contract ID).
# Kinds bound: ENTITY / COMPONENT / LIB / EVT / MSG / DOM / SCREEN / INV(asserted_by).
# CAP-* (transitive), PATTERN-*/ADR-* (behavioral), PERF-* budget targets (PERF-SCROLL/-SORT/… — own
# perf-tier gate)/POLICY-*/LICENSE-*/LEGAL-* are NOT bound. Exception: the v1.1 hot-path guard
# contracts (PERF-CELL-PATH/PERF-FRAME-STEADY/SCALE-*) ARE bound — structural/behavioral regression
# guards backed by *.bench.ts + a behavior assertion (stubbed build-new below until their slices land).

bindings:

  # --- Entities (Domain) ---
  ENTITY-SHEET:
    locators: [{ path: packages/core/src/api/grid.ts, symbol: createGrid }]
  ENTITY-COLUMN:                # v1.3 CAP-COLUMN-MANAGE (slice 19) — additive `hidden?`/`pinned?` view-projection fields
    locators:
      - { path: packages/core/src/api/options.ts, symbol: ColumnDef }
      - { path: packages/core/src/store/store.ts, symbol: getVisibleColumns }
  ENTITY-ROW:
    locators: [{ path: packages/core/src/engine/index-engine.ts, symbol: IndexEngine }]
  ENTITY-CELL:
    locators: [{ path: packages/core/src/util/path.ts, symbol: getByPath }]
  ENTITY-RANGE:
    locators: [{ path: packages/core/src/types.ts, symbol: Range }]
  ENTITY-SELECTION:            # v1.3 CE-MULTI-RANGE-SELECT (slice 17) — reshaped to a disjoint range-set + line selections
    locators:
      - { path: packages/core/src/selection/selection.ts, symbol: SelectionModel }
      - { path: packages/core/src/selection/selection.ts, symbol: Selection }
      - { path: packages/core/src/selection/selection.ts, symbol: LineSelection }
    asserted_by:
      - { path: packages/core/src/selection/selection.test.ts, symbol: "SelectionModel (ENTITY-SELECTION)",
          run: "pnpm vitest run packages/core/src/selection/selection.test.ts" }
  ENTITY-DATA-SOURCE:
    locators: [{ path: packages/core/src/engine/index-engine.ts, symbol: IndexEngine }]

  # --- Components (Architecture) ---
  COMPONENT-DATA-WORKER:
    locators:
      - { path: packages/core/src/engine/index-engine.ts, symbol: IndexEngine }
      - { path: packages/core/src/protocol/engine-host.ts, symbol: EngineHost }
      - { path: packages/core/src/protocol/data-client.ts, symbol: DataClient }
  COMPONENT-STORE:
    locators: [{ path: packages/core/src/store/store.ts, symbol: ReactiveStore }]
  COMPONENT-VIEWPORT:
    locators:
      - { path: packages/core/src/viewport/viewport.ts, symbol: Viewport }
      - { path: packages/core/src/viewport/height-index.ts, symbol: HeightIndex }
  COMPONENT-RENDER:
    locators: [{ path: packages/core/src/render/renderer.ts, symbol: GridRenderer }]
  COMPONENT-API:
    locators: [{ path: packages/core/src/api/grid.ts, symbol: createGrid }]
  COMPONENT-INTERACTION:
    locators:
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
      - { path: packages/core/src/interaction/keymap.ts, symbol: computeMove }
      - { path: packages/core/src/selection/selection.ts, symbol: SelectionModel }
    asserted_by:
      - { path: packages/core/src/interaction/interaction.test.ts, symbol: COMPONENT-INTERACTION,
          run: "pnpm vitest run packages/core/src/interaction/interaction.test.ts" }

  # --- Library API (Interfaces) ---
  LIB-CREATE:
    locators: [{ path: packages/core/src/api/grid.ts, symbol: createGrid }]
  LIB-OPTIONS:                 # v1.3 CAP-HEADER (slice 18) — header?: HeaderConfig (flat rowHeader* removed)
    locators:
      - { path: packages/core/src/api/options.ts, symbol: GridOptions }
      - { path: packages/core/src/types.ts, symbol: HeaderConfig }
      - { path: packages/core/src/worksheet/header-config.ts, symbol: resolveHeaderConfig }
    asserted_by:
      - { path: packages/core/src/worksheet/header.test.ts, symbol: AC-HEADER-CONFIG,
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'AC-HEADER-CONFIG'" }
  LIB-COLUMN-DEF:              # v1.3 CAP-HEADER — headerRender?/headerTooltip?
    locators:
      - { path: packages/core/src/api/options.ts, symbol: ColumnDef }
      - { path: packages/core/src/types.ts, symbol: HeaderRenderer }
    asserted_by:
      - { path: packages/core/src/worksheet/header.test.ts, symbol: "headerTooltip",
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'tooltips'" }
  LIB-SELECTION:               # v1.3 CE-MULTI-RANGE-SELECT (slice 17) — addRange/selectRow(s)/selectColumn(s)/selectAll/clearSelection
    locators:
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
      - { path: packages/core/src/selection/selection.ts, symbol: SelectionModel }
    asserted_by:
      - { path: packages/core/src/interaction/interaction.test.ts, symbol: LIB-SELECTION,
          run: "pnpm vitest run packages/core/src/interaction/interaction.test.ts -t 'LIB-SELECTION'" }
      - { path: packages/core/src/interaction/interaction.test.ts, symbol: AC-SELECTION-SET,
          run: "pnpm vitest run packages/core/src/interaction/interaction.test.ts -t 'AC-SELECTION-SET'" }
      - { path: packages/core/src/selection/selection.test.ts, symbol: "LIB-SELECTION additions (v1.3)",
          run: "pnpm vitest run packages/core/src/selection/selection.test.ts -t 'LIB-SELECTION additions'" }
      - { path: e2e/grid.spec.ts, symbol: AC-SELECTION-SET,
          run: "pnpm exec playwright test e2e/grid.spec.ts -g 'multi-range|column-header|select-all'" }
  LIB-SCROLL:
    locators: [{ path: packages/core/src/api/grid.ts, symbol: createGrid }]

  # --- Worker message protocol (Interfaces MSG-*) ---
  MSG-LOAD:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgLoad }]
  MSG-QUERY-WINDOW:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgQueryWindow }]
  MSG-WINDOW:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgWindow }]
  MSG-INDEX-SUMMARY:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgIndexSummary }]
  MSG-SORT:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgSort }]
  MSG-FILTER:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgFilter }]
  MSG-ERROR:
    locators: [{ path: packages/core/src/protocol/messages.ts, symbol: MsgError }]

  # --- Event surface (Interfaces EVT-*) — the bus + the two Slice-2 events ---
  EVT-ERROR:
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: GridAfterEvents }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
    asserted_by:
      - { path: packages/core/src/api/crosscutting.test.ts, symbol: AC-ERR-TYPE,
          run: "pnpm vitest run packages/core/src/api/crosscutting.test.ts -t 'AC-ERR-TYPE'" }
  EVT-STATE-CHANGE:
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: GridAfterEvents }
      - { path: packages/core/src/store/store.ts, symbol: ReactiveStore }
    asserted_by:
      - { path: packages/core/src/api/crosscutting.test.ts, symbol: EVT-STATE-CHANGE,
          run: "pnpm vitest run packages/core/src/api/crosscutting.test.ts -t 'EVT-STATE-CHANGE'" }
  EVT-SELECTION-CHANGE:        # v1.3 CE-MULTI-RANGE-SELECT — payload now carries the full range-set
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: GridAfterEvents }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
    asserted_by:
      - { path: packages/core/src/interaction/interaction.test.ts, symbol: EVT-SELECTION-CHANGE,
          run: "pnpm vitest run packages/core/src/interaction/interaction.test.ts -t 'EVT-SELECTION-CHANGE'" }
  EVT-SCROLL:
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: GridAfterEvents }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
  EVT-VIEWPORT-CHANGE:
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: GridAfterEvents }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }

  # --- DOM entrypoint layer + input bindings (Interfaces DOM-*/BIND-*) ---
  DOM-ROOT:
    locators: [{ path: packages/core/src/render/renderer.ts, symbol: GridRenderer }]
  DOM-CELL:
    # role=gridcell + data-row-key/-col-id + aria-rowindex/-colindex + aria-selected
    # + aria-readonly + roving tabindex (renderer paints, interaction decorates).
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
  DOM-HEADER:               # extended v1.3 (slice 18) — N bands (role=row, data-band), aria-colspan/rowspan spans, sort-vs-line-select dual-fire
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/worksheet/header-config.ts, symbol: resolveHeaderConfig }
      - { path: packages/core/src/worksheet/header-controller.ts, symbol: HeaderController }
    asserted_by:
      - { path: packages/core/src/worksheet/header.test.ts, symbol: "column-header bands + spans",
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'column-header bands'" }
      - { path: packages/core/src/worksheet/header.test.ts, symbol: "dual-fire split",
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'dual-fire'" }
      - { path: e2e/header.spec.ts, symbol: JOURNEY-HEADER,
          run: "pnpm exec playwright test e2e/header.spec.ts -g 'multi-band|dual-fire'" }
  DOM-ROWHEADER:            # v1.3 CE-HEADER (slice 18) — role=rowheader frozen gutter (M bands), realizes CAP-HEADER (was CAP-ROW-HEADER, retired)
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/worksheet/header-config.ts, symbol: RowHeaderPlan }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
    asserted_by:
      - { path: packages/core/src/worksheet/header.test.ts, symbol: "row-header gutter (DOM-ROWHEADER)",
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'row-header gutter'" }
      - { path: e2e/header.spec.ts, symbol: "row-header gutter frozen",
          run: "pnpm exec playwright test e2e/header.spec.ts -g 'row-header gutter'" }

  # --- v1.3 header subsystem (CE-HEADER / CE-COLUMN-MANAGE / CE-HEADER-MENU / CE-MULTI-RANGE-SELECT) ---
  # DOM-HEADER / DOM-ROWHEADER / DOM-CORNER + LIB-OPTIONS / LIB-COLUMN-DEF BUILT in slice 18;
  # DOM-HEADER-MENU / LAYER-HEADER-MENU BUILT in slice 20 (under CAP-MENU).
  # LIB-COLUMN-MANAGE + EVT-COLUMN-HIDDEN/-PINNED/-AUTOFIT + INV-COLUMN-HIDDEN-EXCLUDED/-PIN-LEADING BUILT in slice 19.
  DOM-CORNER:               # slice 18 — corner select-all + developer-customizable content
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/worksheet/header-controller.ts, symbol: HeaderController }
    asserted_by:
      - { path: packages/core/src/worksheet/header.test.ts, symbol: "corner select-all (DOM-CORNER)",
          run: "pnpm vitest run packages/core/src/worksheet/header.test.ts -t 'corner select-all'" }
      - { path: e2e/header.spec.ts, symbol: "corner click selects the whole sheet",
          run: "pnpm exec playwright test e2e/header.spec.ts -g 'corner click'" }
  DOM-HEADER-MENU:          # slice 20 — dedicated header menu surface (role=menu), builder-driven (v1.4 CAP-MENU)
    locators:
      - { path: packages/core/src/interaction/context-menu.ts, symbol: ContextMenuController }
      - { path: packages/core/src/api/grid.ts, symbol: menuTargetFromNode }
    asserted_by:
      - { path: packages/core/src/interaction/menu.test.ts, symbol: "AC-MENU-CONFIG",
          run: "pnpm vitest run packages/core/src/interaction/menu.test.ts" }
      - { path: e2e/menu.spec.ts, symbol: "right-click a cell vs a column-header",
          run: "pnpm exec playwright test e2e/menu.spec.ts -g 'different menus'" }
  LIB-COLUMN-MANAGE:        # slice 19 — hideColumn/showColumn/pinColumn/autofitColumn/autofitAllColumns
    locators:
      - { path: packages/core/src/worksheet/column-manage.ts, symbol: ColumnManageController }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
      - { path: packages/core/src/render/renderer.ts, symbol: measureColumnContentWidth }
      - { path: packages/core/src/worksheet/header-controller.ts, symbol: handleDblClick }
    asserted_by:
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: "LIB-COLUMN-MANAGE",
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts" }
      - { path: e2e/header.spec.ts, symbol: "hide/pin/autofit + fit-all",
          run: "pnpm exec playwright test e2e/header.spec.ts -g 'hide a column|pin a column|autofits|fit-all'" }
  LAYER-HEADER-MENU:        # slice 20 — dedicated header menu (UX layer); builder-driven (v1.4 CAP-MENU)
    locators:
      - { path: packages/core/src/interaction/context-menu.ts, symbol: ContextMenuController }
      - { path: packages/core/src/interaction/menu.ts, symbol: defaultMenuBuilder }
      - { path: packages/core/src/api/grid.ts, symbol: resolveMenu }
    asserted_by:
      - { path: packages/core/src/interaction/menu.test.ts, symbol: "default builder branches: a column-header menu shows the header built-ins",
          run: "pnpm vitest run packages/core/src/interaction/menu.test.ts -t 'header built-ins'" }
      - { path: e2e/menu.spec.ts, symbol: "AC-MENU-A11Y header submenu",
          run: "pnpm exec playwright test e2e/menu.spec.ts -g 'header submenu'" }
  EVT-COLUMN-HIDDEN:        # slice 19 — fired by hideColumn/showColumn
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: columnHidden }
      - { path: packages/core/src/worksheet/column-manage.ts, symbol: hideColumn }
    asserted_by:
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: "EVT-COLUMN-HIDDEN",
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts -t 'EVT-COLUMN-HIDDEN'" }
  EVT-COLUMN-PINNED:        # slice 19 — fired by pinColumn
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: columnPinned }
      - { path: packages/core/src/worksheet/column-manage.ts, symbol: pinColumn }
    asserted_by:
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: "EVT-COLUMN-PINNED",
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts -t 'EVT-COLUMN-PINNED'" }
  EVT-COLUMN-AUTOFIT:       # slice 19 — fired by autofitColumn/autofitAllColumns
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: columnAutofit }
      - { path: packages/core/src/worksheet/column-manage.ts, symbol: autofitColumn }
    asserted_by:
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: "columnAutofit",
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts -t 'autofit'" }
  INV-COLUMN-HIDDEN-EXCLUDED:   # slice 19 — hidden columns excluded from the visible projection/index; def+data retained
    locators:
      - { path: packages/core/src/store/store.ts, symbol: getVisibleColumns }
      - { path: packages/core/src/api/grid.ts, symbol: computeHiddenCols }
    asserted_by:
      - { path: packages/core/src/store/store.test.ts, symbol: INV-COLUMN-HIDDEN-EXCLUDED,
          run: "pnpm vitest run packages/core/src/store/store.test.ts -t 'INV-COLUMN-HIDDEN-EXCLUDED'" }
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: INV-COLUMN-HIDDEN-EXCLUDED,
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts -t 'INV-COLUMN-HIDDEN-EXCLUDED'" }
  INV-COLUMN-PIN-LEADING:       # slice 19 — pinned columns form a leading contiguous block (RTL-aware; composes with freeze)
    locators:
      - { path: packages/core/src/store/store.ts, symbol: getVisibleColumns }
      - { path: packages/core/src/api/grid.ts, symbol: reflowPinnedOrder }
      - { path: packages/core/src/api/grid.ts, symbol: frozenColExtent }
    asserted_by:
      - { path: packages/core/src/store/store.test.ts, symbol: INV-COLUMN-PIN-LEADING,
          run: "pnpm vitest run packages/core/src/store/store.test.ts -t 'INV-COLUMN-PIN-LEADING'" }
      - { path: packages/core/src/worksheet/column-manage.test.ts, symbol: INV-COLUMN-PIN-LEADING,
          run: "pnpm vitest run packages/core/src/worksheet/column-manage.test.ts -t 'INV-COLUMN-PIN-LEADING'" }

  # --- v1.4 configurable context menus (CE-MENU-CONFIG / CE-HEADER-MENU-RETIRE) ---
  # Builder-driven menus for cell + header/row/corner — BUILT in slice 20 (CAP-MENU).
  # DOM-HEADER-MENU / LAYER-HEADER-MENU above are repointed under CAP-MENU. The cell
  # LAYER-CONTEXT-MENU stays changed-but-bound (ContextMenuController, existing locators, below).
  # MenuBuilder/MenuContext/MenuItem/builtinItems/BuiltinCommandId realize under LIB-MENU.
  # CAP-HEADER-MENU retired -> CAP-MENU (manifest tombstone). CAP-* stay transitive.
  LIB-MENU:                 # slice 20 — openMenu/closeMenu + GridOptions.menu MenuBuilder + builtinItems registry + BuiltinCommandId catalog + Menu* types
    locators:
      - { path: packages/core/src/api/grid.ts, symbol: openMenu }
      - { path: packages/core/src/api/grid.ts, symbol: resolveMenu }
      - { path: packages/core/src/api/grid.ts, symbol: runMenuCommand }
      - { path: packages/core/src/interaction/menu.ts, symbol: builtinItems }
      - { path: packages/core/src/interaction/menu.ts, symbol: BUILTIN_COMMAND_IDS }
      - { path: packages/core/src/interaction/context-menu.ts, symbol: ContextMenuController }
      - { path: packages/core/src/types.ts, symbol: MenuBuilder }
    asserted_by:
      - { path: packages/core/src/interaction/menu.test.ts, symbol: "AC-MENU-CONFIG",
          run: "pnpm vitest run packages/core/src/interaction/menu.test.ts" }
      - { path: e2e/menu.spec.ts, symbol: "programmatic openMenu opens the menu",
          run: "pnpm exec playwright test e2e/menu.spec.ts -g 'programmatic openMenu'" }
  SEC-MENU-CUSTOM-RENDER:   # slice 20 — custom menu-item render() Node mounted as-is (developer-trust boundary; NOT auto-escaped; contrast SEC-RENDERER-DOM-ONLY)
    locators:
      - { path: packages/core/src/interaction/context-menu.ts, symbol: renderLevel }
      - { path: packages/core/src/api/grid.ts, symbol: toRenderItem }
    asserted_by:
      - { path: packages/core/src/interaction/menu.test.ts, symbol: "SEC-MENU-CUSTOM-RENDER: a custom item render Node is mounted AS-IS",
          run: "pnpm vitest run packages/core/src/interaction/menu.test.ts -t 'mounted AS-IS'" }
      - { path: e2e/menu.spec.ts, symbol: "custom item mounted as-is",
          run: "pnpm exec playwright test e2e/menu.spec.ts -g 'different menus'" }
  EVT-MENU-OPEN:            # slice 20 — notify event on context-menu open (cell/header/row/corner)
    locators:
      - { path: packages/core/src/api/event-bus.ts, symbol: menuOpen }
      - { path: packages/core/src/api/grid.ts, symbol: resolveMenu }
    asserted_by:
      - { path: packages/core/src/interaction/menu.test.ts, symbol: "EVT-MENU-OPEN fires with the target + resolved items + position",
          run: "pnpm vitest run packages/core/src/interaction/menu.test.ts -t 'EVT-MENU-OPEN'" }
  BIND-KEYS:
    locators:
      - { path: packages/core/src/interaction/keymap.ts, symbol: DEFAULT_KEY_MAP }
      - { path: packages/core/src/interaction/keymap.ts, symbol: computeMove }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
    asserted_by:
      - { path: packages/core/src/interaction/keymap.test.ts, symbol: BIND-KEYS,
          run: "pnpm vitest run packages/core/src/interaction/keymap.test.ts" }
      - { path: e2e/grid.spec.ts, symbol: BIND-KEYS,
          run: "pnpm e2e -g 'keyboard nav'" }
  BIND-POINTER:
    locators: [{ path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }]
    asserted_by:
      - { path: e2e/grid.spec.ts, symbol: BIND-POINTER,
          run: "pnpm e2e -g 'pointer select'" }

  # --- UI surface + accessibility (UX SCREEN-*, A11y A11Y-*) ---
  SCREEN-GRID:
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }
  A11Y-GRID:
    locators:
      - { path: packages/core/src/render/renderer.ts, symbol: GridRenderer }
      - { path: packages/core/src/interaction/interaction.ts, symbol: InteractionController }
      # Slice 11a: the accessible-announcement contract (live region) + aria-busy.
      - { path: packages/core/src/a11y/announcer.ts, symbol: Announcer }
      - { path: packages/core/src/render/renderer.ts, symbol: "GridRenderer.setBusy" }
      - { path: packages/core/src/api/grid.ts, symbol: createGrid }  # announcer wiring (afterSort/-Filter/-Insert/-Delete/validationError → announce) + beginBusy/endBusy
    asserted_by:
      - { path: e2e/grid.spec.ts, symbol: AC-AXE,
          run: "pnpm e2e -g 'axe-core'" }
      - { path: packages/core/src/interaction/interaction.test.ts, symbol: A11Y-GRID,
          run: "pnpm vitest run packages/core/src/interaction/interaction.test.ts -t 'A11Y-GRID'" }
      # Slice 11a: announcement contract (politeness, coalescing, exclusions) + aria-busy.
      - { path: packages/core/src/a11y/announcer.test.ts, symbol: "A11Y-GRID Announcer",
          run: "pnpm vitest run packages/core/src/a11y/announcer.test.ts" }
      - { path: packages/core/src/a11y/announce-integration.test.ts, symbol: "A11Y-GRID announcement wiring",
          run: "pnpm vitest run packages/core/src/a11y/announce-integration.test.ts" }
      - { path: e2e/a11y.spec.ts, symbol: AC-ANNOUNCE,
          run: "pnpm exec playwright test e2e/a11y.spec.ts -g 'AC-ANNOUNCE'" }
      - { path: e2e/a11y.spec.ts, symbol: AC-FORCED-COLORS,
          run: "pnpm exec playwright test e2e/a11y.spec.ts -g 'forced-colors'" }

  # --- Invariants (Domain) — enforcement site + asserting test ---
  INV-COLKEY-UNIQUE:
    locators: [{ path: packages/core/src/store/store.ts, symbol: ReactiveStore }]
    asserted_by:
      - { path: packages/core/src/api/invariants.test.ts, symbol: INV-COLKEY-UNIQUE,
          run: "pnpm vitest run packages/core/src/api/invariants.test.ts -t 'INV-COLKEY-UNIQUE'" }
  INV-ROWKEY-UNIQUE:
    locators: [{ path: packages/core/src/engine/index-engine.ts, symbol: IndexEngine }]
    asserted_by:
