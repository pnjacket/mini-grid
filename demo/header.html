<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mini-grid — header region (CAP-HEADER)</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      header {
        padding: 8px 12px;
        border-bottom: 1px solid #ddd;
        font-size: 14px;
      }
      #status {
        color: #555;
      }
      /* The grid root fills a fixed viewport so virtualization has a window. The
         multi-band header sizes itself from header.columns.height (no fixed
         .mg-header height override here). */
      #app {
        position: relative;
        height: calc(100vh - 42px);
      }
      [data-mini-grid] {
        height: 100%;
      }
      [data-mini-grid] .mg-scroll {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      mini-grid header region — <span id="status">loading…</span> ·
      selection: <span id="selection">none</span>
      <span style="margin-left: 12px">
        <!-- CAP-COLUMN-MANAGE (LIB-COLUMN-MANAGE) E2E targets — NOT a menu (slice 20). -->
        <button id="hide-grade" type="button">Hide Grade</button>
        <button id="show-grade" type="button">Show Grade</button>
        <button id="pin-city" type="button">Pin City</button>
        <button id="unpin-city" type="button">Unpin City</button>
        <button id="autofit-name" type="button">Autofit Name</button>
        <button id="autofit-all" type="button">Autofit All</button>
      </span>
    </header>
    <div id="app"></div>
    <script type="module" src="./header.js"></script>
  </body>
</html>
