<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mini-grid demo — 1,000,000 rows</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      header {
        padding: 8px 12px;
        border-bottom: 1px solid #ddd;
        font-size: 14px;
      }
      #status {
        color: #555;
      }
      /* The grid root fills a fixed viewport so virtualization has a window.
         Colors, borders, selection + focus ring come from @mini-grid/core's
         injected base stylesheet (AA-contrast default theme). */
      #app {
        position: relative;
        height: calc(100vh - 42px);
      }
      [data-mini-grid] {
        height: 100%;
      }
      [data-mini-grid] .mg-scroll {
        height: 100%;
      }
      [data-mini-grid] .mg-header {
        height: 28px;
      }
    </style>
  </head>
  <body>
    <header>
      mini-grid demo — <span id="status">loading…</span> ·
      selection: <span id="selection">none</span>
    </header>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
